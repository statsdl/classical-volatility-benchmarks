name: Generate GitHub Results

on:
  workflow_dispatch:
    inputs:
      synthetic_n:
        description: "Synthetic sample size"
        required: false
        default: "1200"
      run_sensitivity:
        description: "Run sensitivity analysis"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]

permissions:
  contents: write

jobs:
  generate-results:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Generate benchmark report
        run: |
          EXTRA=""
          if [ "${{ github.event.inputs.run_sensitivity }}" = "true" ]; then
            EXTRA="--run-sensitivity --sensitivity-windows 10 22 --sensitivity-alphas 0.025 0.05 --sensitivity-train-fractions 0.70 0.80"
          fi
          python examples/run_classical_volatility_benchmarks.py \
            --mode synthetic \
            --synthetic-n "${{ github.event.inputs.synthetic_n }}" \
            --realized-window 22 \
            --train-fraction 0.70 \
            --alpha 0.05 \
            --outdir docs/results \
            --github-report \
            $EXTRA
      - name: Commit generated results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/results
          if git diff --cached --quiet; then
            echo "No generated result changes."
          else
            git commit -m "Update generated volatility benchmark results"
            git push
          fi
